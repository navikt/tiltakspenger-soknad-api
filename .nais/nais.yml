apiVersion: nais.io/v1alpha1
kind: Application
metadata:
  name: tiltakspenger-soknad-api
  namespace: tpts
  labels:
    team: tpts
  annotations:
    nginx.ingress.kubernetes.io/proxy-read-timeout: "60"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "60"
    nginx.ingress.kubernetes.io/proxy-body-size: "20m"
    config.linkerd.io/proxy-outbound-connect-timeout: 3000ms
spec:
  image: {{ image }}
  port: 8080
  azure:
    application:
      enabled: true
  # Prober følger felles mal, se «Delte konvensjoner» i navikt/tiltakspenger AGENTS.md. Avvik skal begrunnes med kommentar her.
  startup:
    path: /isalive
    initialDelay: 5
    periodSeconds: 5
    failureThreshold: 60
    timeout: 3
  liveness:
    path: /isalive
    periodSeconds: 10
    failureThreshold: 3
    timeout: 3
  readiness:
    path: /isready
    periodSeconds: 5
    failureThreshold: 1
    timeout: 3
  prometheus:
    enabled: true
    path: /metrics
  replicas:
    min: 2
    max: 4
  kafka:
    pool: {{ kafka.pool }}
  tokenx:
    enabled: true
  leaderElection: true
  gcp:
    sqlInstances:
      - name: tiltakspenger-soknad-api
        type: POSTGRES_15
        tier: {{ sqlInstances.tier }}
        diskAutoresize: {{ sqlInstances.diskAutoresize }}
        pointInTimeRecovery: {{ sqlInstances.pointInTimeRecovery }}
        flags:
          - name: "cloudsql.enable_pgaudit"
            value: "on"
          - name: "pgaudit.log"
            value: "write,ddl,role"
          - name: "pgaudit.log_parameter"
            value: "on"
        databases:
          - name: soknad
            envVarPrefix: DB
  accessPolicy:
    inbound:
      rules:
        - application: tiltakspenger-soknad
          namespace: tpts
          cluster: {{ cluster }}
    outbound:
      rules:
        - application: tiltakspenger-tiltak
        - application: tiltakspenger-pdfgen
        - application: tiltakspenger-pdfgenrs
        - application: tiltakspenger-saksbehandling-api
        - application: clamav
          namespace: nais-system
        - application: logging
          namespace: nais-system
      external:
        - host: {{outboundExternalUrls.pdl}}
        - host: {{outboundExternalUrls.dokarkiv}}
  env:
    - name: PDL_ENDPOINT_URL
      value: {{ endpoints.pdl }}
    - name: PDL_SCOPE
      value: {{ scope.pdl }}
    - name: DOKARKIV_ENDPOINT_URL
      value: {{ endpoints.dokarkiv }}
    - name: DOKARKIV_SCOPE
      value: {{ scope.dokarkiv }}
    - name: VEDTAK_SCOPE
      value: {{ scope.vedtak }}
    - name: TILTAKSPENGER_VEDTAK_ENDPOINT_URL
      value: {{ endpoints.tiltakspengervedtak }}
    - name: PDF_ENDPOINT_URL
      value: {{ endpoints.pdf }}
    - name: PDFGENRS_ENDPOINT_URL
      value: {{ endpoints.pdfgenrs }}
    - name: AV_ENDPOINT_URL
      value: {{ endpoints.av }}
    - name: TILTAKSPENGER_TILTAK_ENDPOINT_URL
      value: {{ endpoints.tiltakspengertiltak }}
    - name: TILTAKSPENGER_TILTAK_SCOPE
      value: {{ scope.tiltakspengertiltak }}
  resources:
    limits:
      memory: 2048Mi
    requests:
      memory: 1024Mi
  observability:
    autoInstrumentation:
      enabled: true
      runtime: java
    logging:
      destinations:
        - id: elastic
        - id: loki
